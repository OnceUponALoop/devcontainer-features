name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-autogenerated:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - proxy-ca-autotrust
          - install-mise-copr
        baseImage:
          - debian:latest
          - ubuntu:latest
          - mcr.microsoft.com/devcontainers/base:ubuntu
    steps:
      - uses: actions/checkout@v6

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios-mise-copr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Run install-mise-copr scenarios"
        run: devcontainer features test -f install-mise-copr --skip-autogenerated .

  test-scenarios-proxy-ca-autotrust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Start TLS test server"
        run: |
          openssl s_server \
            -accept 18443 \
            -www \
            -cert test/proxy-ca-autotrust/fixtures/leaf.pem \
            -key  test/proxy-ca-autotrust/fixtures/leaf.key \
            -cert_chain test/proxy-ca-autotrust/fixtures/chain.pem \
            > /tmp/proxy-ca-test-server.log 2>&1 &
          sleep 1
          kill -0 $! || { cat /tmp/proxy-ca-test-server.log; exit 1; }

      - name: "Run proxy-ca-autotrust scenarios"
        run: devcontainer features test -f proxy-ca-autotrust --skip-autogenerated .
