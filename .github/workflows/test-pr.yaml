name: "PR - Test Changed Features"
on:
  pull_request:
    paths-ignore:
      - '**/README.md'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.filter.outputs.changes }}
      proxy-ca-autotrust: ${{ steps.filter.outputs.proxy-ca-autotrust }}
      install-mise-copr: ${{ steps.filter.outputs.install-mise-copr }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            proxy-ca-autotrust: ./**/proxy-ca-autotrust/**
            install-mise-copr: ./**/install-mise-copr/**

  test-autogenerated:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.features != '[]'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features: ${{ fromJSON(needs.detect-changes.outputs.features) }}
        baseImage:
          - mcr.microsoft.com/devcontainers/base:ubuntu
          - mcr.microsoft.com/devcontainers/base:debian
    steps:
      - uses: actions/checkout@v7

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios-mise-copr:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.install-mise-copr == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Run install-mise-copr scenarios"
        run: devcontainer features test -f install-mise-copr --skip-autogenerated .

  test-scenarios-proxy-ca-autotrust:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.proxy-ca-autotrust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Start TLS test server"
        run: |
          openssl s_server \
            -accept 0.0.0.0:18443 \
            -www \
            -cert test/proxy-ca-autotrust/fixtures/leaf.pem \
            -key  test/proxy-ca-autotrust/fixtures/leaf.key \
            -cert_chain test/proxy-ca-autotrust/fixtures/chain.pem \
            > /tmp/proxy-ca-test-server.log 2>&1 &
          sleep 1
          kill -0 $! || { cat /tmp/proxy-ca-test-server.log; exit 1; }

      - name: "Patch test endpoint for Docker bridge access"
        run: |
          BRIDGE_IP="$(docker network inspect bridge --format='{{range .IPAM.Config}}{{.Gateway}}{{end}}')"

          if [ -z "${BRIDGE_IP}" ]; then
            echo "Unable to determine Docker bridge gateway"
            docker network inspect bridge
            exit 1
          fi

          echo "Using Docker bridge gateway: ${BRIDGE_IP}"
          curl -vk "https://${BRIDGE_IP}:18443" || true

          sed -i "s|127\.0\.0\.1:18443|${BRIDGE_IP}:18443|g" \
            test/proxy-ca-autotrust/scenarios.json

      - name: "Run proxy-ca-autotrust scenarios"
        run: devcontainer features test -f proxy-ca-autotrust --skip-autogenerated .
