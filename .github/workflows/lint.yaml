name: "CI - Lint Shell Scripts"
on:
  push:
    branches:
      - main
    paths:
      - 'src/**/*.sh'
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Run shellcheck"
        uses: azohra/shell-linter@v0.8.0
        with:
          path: "src/**/*.sh"
          severity: "error"
        env:
          SHELLCHECK_OPTS: -e SC2072
